spring:
  application:
    name: master-data-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:repairshop}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
server:
  port: ${PORT:8091}
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-repair-shop-saas-jwt-signing}
  cloudinary:
    # If any of cloud-name / api-key / api-secret is blank, MediaController
    # falls back to inline base64 data URIs.
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:ggfix/master}
  imei:
    # IMEI.info device-lookup proxy (GET /master/imei-lookup). The token + the
    # numeric service id come from env so no secret is committed. When either is
    # blank the endpoint returns matched=false and the app falls back to the
    # manual "Choose a Device" picker. Prod host has a valid cert; the dev host
    # (dash.dev.imei.info) serves an untrusted chain. Path uses a trailing slash.
    base-url: ${IMEI_API_BASE_URL:https://dash.imei.info/api}
    token: ${IMEI_API_TOKEN:}
    # 0 = "Basic IMEI Check" (brand/model/model-numbers, token based).
    service-id: ${IMEI_API_SERVICE_ID:0}
