# Run with: spring.profiles.active=dev (in-memory H2, same JWT secret as auth-service)
spring:
  datasource:
    url: jdbc:h2:mem:tickets;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

server:
  port: ${PORT:8082}

# Must match auth-service so tokens work
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-repair-shop-saas-jwt-signing}
