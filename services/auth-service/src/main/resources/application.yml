spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:repairshop}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-repair-shop-saas-jwt-signing}
    expiry-ms: ${JWT_EXPIRY_MS:31536000000}   # 365 days — stay logged in until explicit logout (app-lock guards access)
  resend:
    # Provide the key via the RESEND_API_KEY env var (do NOT hardcode it here —
    # this file is committed). Email OTP is disabled if unset.
    api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM_EMAIL:noreply@globogreen.in}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
