spring:
  application:
    name: shop-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:repairshop}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  # KYC docs in dev arrive as base64 data URIs (master-service Cloudinary
  # fallback) — 1-3 MB per image. A 5-doc payload can be 15 MB. Default Tomcat
  # cap is 2 MB which throws a generic 500 before the controller is reached.
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  codec:
    max-in-memory-size: 50MB
server:
  port: ${PORT:8084}
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-repair-shop-saas-jwt-signing}
