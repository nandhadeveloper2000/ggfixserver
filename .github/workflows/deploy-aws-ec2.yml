name: Deploy GGFix Backend to AWS EC2

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "services/**"
      - "deploy/aws/**"
      - ".github/workflows/deploy-aws-ec2.yml"

permissions:
  contents: read

concurrency:
  group: ggfixserver-ec2-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
      EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build all Spring Boot services
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -f services/pom.xml clean package -DskipTests

      - name: Create deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          SERVICES=(
            auth-service
            user-service
            shop-service
            ticket-service
            technician-service
            inventory-service
            marketplace-service
            pickup-service
            notification-service
            subscription-service
            master-data-service
            order-service
          )

          rm -rf deploy-bundle repair-shop-saas-deploy.tgz

          mkdir -p \
            deploy-bundle/services \
            deploy-bundle/deploy/aws \
            deploy-bundle/postgres/init

          cp -a deploy/aws/. deploy-bundle/deploy/aws/

          if [ -d "services/postgres/init" ]; then
            cp -a services/postgres/init/. deploy-bundle/postgres/init/
          fi

          for SERVICE in "${SERVICES[@]}"; do
            TARGET_DIR="deploy-bundle/services/${SERVICE}"

            JAR_FILE=$(find "services/${SERVICE}/target" \
              -maxdepth 1 \
              -type f \
              -name "*.jar" \
              ! -name "*original*" \
              | head -n 1)

            if [ -z "${JAR_FILE:-}" ] || [ ! -f "$JAR_FILE" ]; then
              echo "ERROR: JAR was not created for service: $SERVICE"
              echo "Checked directory: services/${SERVICE}/target"
              ls -lah "services/${SERVICE}/target" || true
              exit 1
            fi

            mkdir -p "$TARGET_DIR"
            cp "$JAR_FILE" "$TARGET_DIR/${SERVICE}.jar"

            echo "Added $SERVICE:"
            ls -lh "$TARGET_DIR/${SERVICE}.jar"
          done

          tar -czf repair-shop-saas-deploy.tgz -C deploy-bundle .

          echo "Deployment bundle created:"
          ls -lh repair-shop-saas-deploy.tgz

      - name: Configure SSH securely
        shell: bash
        run: |
          set -euo pipefail

          : "${EC2_HOST:?EC2_HOST repository secret is required}"
          : "${EC2_USER:?EC2_USER repository secret is required}"
          : "${EC2_SSH_PRIVATE_KEY_B64:?EC2_SSH_PRIVATE_KEY_B64 repository secret is required}"
          : "${EC2_KNOWN_HOSTS:?EC2_KNOWN_HOSTS repository secret is required}"

          install -d -m 700 "$HOME/.ssh"

          printf '%s' "$EC2_SSH_PRIVATE_KEY_B64" \
            | base64 --decode > "$HOME/.ssh/id_ed25519"

          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$EC2_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" > /dev/null

      - name: Verify EC2 SSH access
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            "$EC2_USER@$EC2_HOST" \
            "echo 'EC2 SSH verification successful'; hostname; whoami"

      - name: Upload deployment bundle to EC2
        shell: bash
        run: |
          set -euo pipefail

          scp \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            repair-shop-saas-deploy.tgz \
            "$EC2_USER@$EC2_HOST:/tmp/repair-shop-saas-deploy.tgz"

      - name: Deploy services on EC2
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$EC2_USER@$EC2_HOST" \
            "bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          BUNDLE="/tmp/repair-shop-saas-deploy.tgz"
          RELEASE_DIR="/tmp/repair-shop-saas-release"

          test -f "$BUNDLE"

          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          tar -xzf "$BUNDLE" -C "$RELEASE_DIR"

          bash "$RELEASE_DIR/deploy/aws/install-ec2.sh"
          bash "$RELEASE_DIR/deploy/aws/deploy-from-artifact.sh"

          echo
          echo "========== ACTIVE GGFix SERVICES =========="
          sudo systemctl --no-pager --type=service \
            | grep "repair-shop-saas@" || true

          echo
          echo "========== POSTGRES CONTAINER =========="
          sudo docker ps || true
          REMOTE_SCRIPT
