name: Deploy Backend to AWS EC2

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "services/**"
      - "deploy/aws/**"
      - ".github/workflows/deploy-aws-ec2.yml"

permissions:
  contents: read

concurrency:
  group: ggfixserver-ec2-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy to EC2
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
      EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend services
        run: |
          set -euo pipefail
          mvn -f services/pom.xml clean package -DskipTests

      - name: Create deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          services=(
            auth-service
            user-service
            shop-service
            ticket-service
            technician-service
            inventory-service
            marketplace-service
            pickup-service
            notification-service
            subscription-service
            master-data-service
            order-service
          )

          rm -rf deploy-bundle repair-shop-saas-deploy.tgz

          mkdir -p \
            deploy-bundle/services \
            deploy-bundle/deploy/aws \
            deploy-bundle/postgres

          cp -R deploy/aws/. deploy-bundle/deploy/aws/
          cp -R services/postgres/init deploy-bundle/postgres/init

          for service in "${services[@]}"; do
            jar_file="services/$service/target/$service-1.0.0-SNAPSHOT.jar"

            if [ ! -f "$jar_file" ]; then
              echo "ERROR: JAR file not found: $jar_file"
              exit 1
            fi

            mkdir -p "deploy-bundle/services/$service"
            cp "$jar_file" "deploy-bundle/services/$service/$service.jar"
          done

          tar -czf repair-shop-saas-deploy.tgz -C deploy-bundle .

          echo "Deployment bundle created successfully."
          ls -lh repair-shop-saas-deploy.tgz

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          : "${EC2_HOST:?EC2_HOST secret is required}"
          : "${EC2_USER:?EC2_USER secret is required}"
          : "${EC2_KNOWN_HOSTS:?EC2_KNOWN_HOSTS secret is required}"
          : "${EC2_SSH_PRIVATE_KEY_B64:?EC2_SSH_PRIVATE_KEY_B64 secret is required}"

          install -d -m 700 "$HOME/.ssh"

          printf '%s' "$EC2_SSH_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$EC2_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh-keygen -lf "$HOME/.ssh/id_ed25519"

      - name: Verify EC2 SSH connection
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            "$EC2_USER@$EC2_HOST" \
            "echo 'SSH connection successful'; hostname; whoami"

      - name: Upload deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          scp \
            -i "$HOME/.ssh/id_ed25519" \
            -o StrictHostKeyChecking=yes \
            repair-shop-saas-deploy.tgz \
            "$EC2_USER@$EC2_HOST:/tmp/repair-shop-saas-deploy.tgz"

      - name: Deploy on EC2
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o StrictHostKeyChecking=yes \
            "$EC2_USER@$EC2_HOST" \
            'bash -s' <<'REMOTE_SCRIPT'
              set -euo pipefail

              RELEASE_DIR="/tmp/repair-shop-saas-release"

              rm -rf "$RELEASE_DIR"
              mkdir -p "$RELEASE_DIR"

              tar -xzf /tmp/repair-shop-saas-deploy.tgz -C "$RELEASE_DIR"

              chmod +x "$RELEASE_DIR/deploy/aws/install-ec2.sh"
              chmod +x "$RELEASE_DIR/deploy/aws/deploy-from-artifact.sh"

              bash "$RELEASE_DIR/deploy/aws/install-ec2.sh"
              bash "$RELEASE_DIR/deploy/aws/deploy-from-artifact.sh"
          REMOTE_SCRIPT